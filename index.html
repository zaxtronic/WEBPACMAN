<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio Pro | mrpacman1977</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-gradient: radial-gradient(circle at top right, #1f1f2e, #09090b);
            --pacman-yellow: #FFD700;
            --pacman-glow: rgba(255, 215, 0, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --error-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-dark); background-image: var(--bg-gradient); color: var(--text-main);
            min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 15px; overflow-x: hidden;
        }

        /* Notificaciones flotantes */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); color: var(--text-main);
            padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 600;
            z-index: 1000; transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px;
            width: max-content; max-width: 90vw; text-align: center;
        }

        .container {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 30px;
            width: 100%; max-width: 650px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); margin-top: 10px;
        }

        header { text-align: center; margin-bottom: 30px; }
        .logo-art { font-size: 2.2rem; color: var(--pacman-yellow); text-shadow: 0 0 20px var(--pacman-glow); letter-spacing: 5px; margin-bottom: 10px; animation: pulse 2s infinite; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; background: linear-gradient(90deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 300; }
        .model-badge { display: inline-block; background: rgba(255, 215, 0, 0.1); color: var(--pacman-yellow); border: 1px solid var(--pacman-yellow); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-top: 15px; letter-spacing: 1px;}

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        input[type="password"], textarea {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 16px; border-radius: 14px; font-size: 1rem; outline: none; transition: all 0.3s ease;
        }

        input[type="password"]:focus, textarea:focus { border-color: var(--pacman-yellow); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); background: rgba(0, 0, 0, 0.4); }
        textarea { resize: none; height: 100px; line-height: 1.5; }

        .tabs { display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 16px; padding: 6px; margin-bottom: 25px; border: 1px solid var(--glass-border); }
        .tab-btn { flex: 1; padding: 14px; background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 12px; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .tab-btn.active { background: var(--pacman-yellow); color: #000; box-shadow: 0 4px 15px var(--pacman-glow); }

        .generate-btn {
            width: 100%; background: linear-gradient(135deg, var(--pacman-yellow), #e6b800);
            color: #000; border: none; padding: 18px; font-size: 1.1rem; font-weight: 800;
            border-radius: 14px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px var(--pacman-glow); }
        .generate-btn:disabled { background: #2a2a35; color: #555; cursor: not-allowed; box-shadow: none; transform: none; }

        .output-section { margin-top: 35px; border-radius: 16px; padding: 2px; background: transparent; position: relative; transition: all 0.3s ease; }
        .output-inner { background: rgba(0,0,0,0.4); border: 1px dashed var(--glass-border); border-radius: 14px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .output-media { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; display: none; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .ai-thinking { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 215, 0, 0.1); border-left-color: var(--pacman-yellow); border-radius: 50%; animation: spin 1s linear infinite; }
        .thinking-text { color: var(--pacman-yellow); font-weight: 600; animation: pulseText 1.5s infinite; }

        .download-btn { margin-top: 15px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; transition: all 0.3s; font-weight: 600;}
        .download-btn:hover { background: var(--pacman-yellow); color: black; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; text-shadow: 0 0 10px var(--pacman-glow); } }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 600px) {
            .container { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 1.8rem; }
            .logo-art { font-size: 1.8rem; }
            .tab-btn { font-size: 0.9rem; padding: 12px; }
            .generate-btn { font-size: 1rem; padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- Sistema de Alertas -->
    <div id="toast"><span id="toastIcon"></span> <span id="toastMsg"></span></div>

    <div class="container">
        <header>
            <div class="logo-art">ᗧ · · · ᗣ</div>
            <h1>mrpacman1977 Studio</h1>
            <p class="subtitle">Conectado directamente a la API de Google Gemini</p>
            <div id="modelBadge" class="model-badge">MOTOR ACTIVO: NANO BANANA</div>
        </header>

        <div class="input-group">
            <label for="apiKey">Tu API Key de Gemini (Empieza por AIza...)</label>
            <input type="password" id="apiKey" placeholder="Pega tu API Key de Google AI Studio aquí..." autocomplete="off">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="setMode('photo')" id="btn-photo">📷 Foto (NANO BANANA)</button>
            <button class="tab-btn" onclick="setMode('video')" id="btn-video">🎥 Video (VEO)</button>
        </div>

        <div class="input-group">
            <label for="prompt">Instrucción para la IA</label>
            <textarea id="prompt" placeholder="Ej: Un coche deportivo rojo derrapando en una ciudad cyberpunk, hiperrealista, 8k..."></textarea>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generateMedia()">
            <span>Sintetizar Obra</span> ✨
        </button>

        <div class="output-section">
            <div class="output-inner" id="outputArea">
                
                <div class="ai-thinking" id="loader">
                    <div class="spinner"></div>
                    <p class="thinking-text" id="loadingText">Procesando en servidores de Google...</p>
                </div>

                <p id="outputPlaceholder" style="color: var(--text-muted); font-weight: 300;">
                    El lienzo está en blanco. Introduce tu API Key y tu idea.
                </p>

                <img id="resultImage" class="output-media" alt="Imagen generada por IA">
                <video id="resultVideo" class="output-media" controls autoplay loop playsinline></video>
                
                <button id="downloadBtn" class="download-btn" onclick="downloadImage()">⬇️ Descargar</button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'photo'; 
        let currentMediaUrl = '';

        // Función para mostrar notificaciones flotantes (Toasts)
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            document.getElementById('toastIcon').innerText = type === 'error' ? '⚠️' : '✅';
            toast.style.borderColor = type === 'error' ? 'var(--error-color)' : 'var(--pacman-yellow)';
            toast.style.top = '20px';
            setTimeout(() => { toast.style.top = '-100px'; }, 4000);
        }

        // Cambiar entre Foto y Video
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-photo').classList.remove('active');
            document.getElementById('btn-video').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');

            const badge = document.getElementById('modelBadge');
            if(mode === 'photo') {
                document.getElementById('prompt').placeholder = "Ej: Un coche deportivo rojo derrapando en una ciudad cyberpunk, hiperrealista, 8k...";
                badge.innerText = "MOTOR ACTIVO: NANO BANANA";
            } else {
                document.getElementById('prompt').placeholder = "Ej: Animación cinemática de una cámara sobrevolando un paisaje digital retro...";
                badge.innerText = "MOTOR ACTIVO: VEO (EXPERIMENTAL)";
            }

            resetOutput();
        }

        function resetOutput() {
            document.getElementById('resultImage').style.display = 'none';
            document.getElementById('resultVideo').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('outputPlaceholder').style.display = 'block';
            document.getElementById('outputPlaceholder').innerText = "El lienzo está en blanco. Introduce tu idea arriba.";
            currentMediaUrl = '';
        }

        // FUNCIÓN PRINCIPAL: LLAMADA REAL A LA API DE GEMINI
        async function generateMedia() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('prompt').value.trim();
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('outputPlaceholder');
            const resultImage = document.getElementById('resultImage');
            const resultVideo = document.getElementById('resultVideo');
            const downloadBtn = document.getElementById('downloadBtn');
            const loadingText = document.getElementById('loadingText');

            if (!apiKey.startsWith("AIza")) {
                showToast("Por favor, ingresa una API Key válida de Google AI Studio (Empieza por AIza...)", "error");
                return;
            }
            if (!prompt) {
                showToast("¡Hey mrpacman! Olvidaste escribir la instrucción (prompt).", "error");
                return;
            }

            // UI Cargando
            btn.disabled = true;
            btn.innerHTML = `<span>Comunicando con la IA...</span> ⏳`;
            placeholder.style.display = 'none';
            resultImage.style.display = 'none';
            resultVideo.style.display = 'none';
            downloadBtn.style.display = 'none';
            loader.style.display = 'flex';
            
            // Textos dinámicos
            loadingText.innerText = currentMode === 'photo' ? "Nano Banana está pintando..." : "Google VEO está renderizando (puede tardar)...";

            try {
                // URL Base oficial de Gemini API
                const baseUrl = "https://generativelanguage.googleapis.com/v1beta/models";
                
                if (currentMode === 'photo') {
                    // LLAMADA REAL: NANO BANANA (Mapeado a imagen-3.0-generate-001)
                    const modelEndpoint = `${baseUrl}/imagen-3.0-generate-001:predict?key=${apiKey}`;
                    
                    const response = await fetch(modelEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: [{ prompt: prompt }],
                            parameters: { sampleCount: 1 }
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || "Error desconocido en la API de Google");
                    }

                    // Extraer Base64
                    const base64Image = data.predictions[0].bytesBase64Encoded;
                    currentMediaUrl = `data:image/jpeg;base64,${base64Image}`;
                    
                    resultImage.src = currentMediaUrl;
                    resultImage.style.display = 'block';
                    downloadBtn.style.display = 'inline-block';
                    showToast("¡Obra creada por Nano Banana!", "success");

                } else {
                    // LLAMADA REAL: VEO (Mapeado a veo-2.0-generate-001 o similar en AI Studio)
                    // Nota: Veo suele estar restringido a cuentas en "Private Preview". 
                    // Si tu API Key no tiene acceso a VEO, Google devolverá un error 403 o 404 que se mostrará en pantalla.
                    const modelEndpoint = `${baseUrl}/veo-2.0-generate-001:predict?key=${apiKey}`;
                    
                    const response = await fetch(modelEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: [{ prompt: prompt }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || "Tu API Key no tiene acceso a VEO o el modelo no está disponible.");
                    }

                    // VEO suele devolver una URI o un Base64 del MP4 dependiendo de la versión de la API
                    if (data.predictions[0].bytesBase64Encoded) {
                        currentMediaUrl = `data:video/mp4;base64,${data.predictions[0].bytesBase64Encoded}`;
                    } else if (data.predictions[0].uri) {
                        currentMediaUrl = data.predictions[0].uri;
                    }

                    resultVideo.src = currentMediaUrl;
                    resultVideo.style.display = 'block';
                    showToast("¡Video creado por VEO!", "success");
                }

                // Scroll automático en móviles
                if(window.innerWidth <= 600) {
                    document.querySelector('.output-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }

            } catch (error) {
                console.error("Detalle del error:", error);
                resetOutput();
                showToast(`Error de IA: ${error.message}`, "error");
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.innerHTML = `<span>Sintetizar Otra Obra</span> ✨`;
            }
        }

        // Función para descargar
        function downloadImage() {
            if(!currentMediaUrl) return;
            const a = document.createElement('a');
            a.href = currentMediaUrl;
            a.download = `mrpacman1977_${currentMode}_${Math.floor(Math.random()*1000)}.${currentMode === 'photo' ? 'jpg' : 'mp4'}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast("¡Descarga iniciada!", "success");
        }
    </script>
</body>
</html>
